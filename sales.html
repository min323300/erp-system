<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매 관리 - 거래명세 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
    <script>
    if (localStorage.getItem('erp_auth') !== 'ok') {
        location.href = 'login.html';
    }
    </script>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="index.html">거래명세 관리 시스템</a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">대시보드</a></li>
                <li><a href="sales.html" class="active">판매</a></li>
                <li><a href="payment.html">입금</a></li>
                <li><a href="purchase.html">입고</a></li>
                <li><a href="supplypayment.html">지급</a></li>
                <li><a href="inventory.html">재고</a></li>
                <li><a href="accounting.html">회계</a></li>
                <li><a href="monthly.html">월별집계</a></li>
                <li><a href="settings.html">설정</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">판매 관리</h1>
            </div>

            <section class="card">
                <h2>판매 등록</h2>
                <form id="sale-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sale-date">판매일 *</label>
                            <input type="date" id="sale-date" required>
                        </div>
                        <div class="form-group">
                            <label>거래처 *</label>
                            <div class="search-select-wrap">
                                <input type="text" id="customer-search" placeholder="거래처 검색 (앞글자 입력)" autocomplete="off"
                                    oninput="filterCustomerList(this.value)"
                                    onfocus="showCustomerList()"
                                    onblur="setTimeout(()=>hideCustomerList(),200)">
                                <input type="hidden" id="sale-customer">
                                <div id="customer-dropdown" class="search-dropdown" style="display:none;"></div>
                            </div>
                            <small id="custom-price-status" style="color:#1976d2; font-size:12px; margin-top:4px; display:block;"></small>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="sale-delivery">배송방식</label>
                            <select id="sale-delivery">
                                <option value="오프라인">오프라인</option>
                                <option value="택배">택배</option>
                                <option value="퀵">퀵</option>
                                <option value="직접배송">직접배송</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="sale-box-return">공박스회수 *</label>
                            <select id="sale-box-return" required>
                                <option value="회수">회수</option>
                                <option value="미회수">미회수</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="sale-payment-status">입금여부</label>
                            <select id="sale-payment-status">
                                <option value="미입금">미입금</option>
                                <option value="입금완료">입금완료</option>
                                <option value="부분입금">부분입금</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="sale-payment-amount">입금액</label>
                            <input type="number" id="sale-payment-amount" value="0">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>품목 추가</h3>
                        <div id="items-container"></div>
                        <button type="button" class="btn btn-secondary" onclick="addItemRow()">+ 품목 추가</button>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">일괄 등록</button>
                        <button type="button" class="btn btn-secondary" onclick="resetSaleForm()">초기화</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <h2>판매 내역</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="filter-date">기간 필터</label>
                        <input type="date" id="filter-date">
                    </div>
                    <div class="form-group">
                        <label>거래처 필터</label>
                        <div class="search-select-wrap">
                            <input type="text" id="filter-customer-search" placeholder="전체 (앞글자 입력)" autocomplete="off"
                                oninput="filterCustomerList2(this.value)"
                                onfocus="showCustomerList2()"
                                onblur="setTimeout(()=>hideCustomerList2(),200)">
                            <input type="hidden" id="filter-customer" value="">
                            <div id="customer-dropdown2" class="search-dropdown" style="display:none;"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="button" class="btn btn-primary" onclick="loadSales()" style="margin-top: 24px;">조회</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>거래처</th>
                                <th>품목</th>
                                <th>수량</th>
                                <th>단가</th>
                                <th>공급가</th>
                                <th>부가세</th>
                                <th>합계</th>
                                <th>입금여부</th>
                                <th>미수금</th>
                                <th>배송방식</th>
                                <th>이력번호</th>
                                <th>공박스</th>
                                <th>명세표/수정</th>
                            </tr>
                        </thead>
                        <tbody id="sales-tbody"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <!-- ==================== 수정 모달 ==================== -->
        <div id="edit-modal" class="edit-modal-overlay" style="display:none;">
            <div class="edit-modal-content">
                <div class="edit-modal-header">
                    <h2>📝 판매 내역 수정</h2>
                    <button class="edit-modal-close" onclick="closeEditModal()">&times;</button>
                </div>
                <div class="edit-modal-body">
                    <div class="edit-modal-info" id="edit-modal-info"></div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-date">판매일 *</label>
                            <input type="date" id="edit-date" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-delivery">배송방식</label>
                            <select id="edit-delivery">
                                <option value="오프라인">오프라인</option>
                                <option value="택배">택배</option>
                                <option value="퀵">퀵</option>
                                <option value="직접배송">직접배송</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-box-return">공박스회수</label>
                            <select id="edit-box-return">
                                <option value="회수">회수</option>
                                <option value="미회수">미회수</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edit-payment-status">입금여부</label>
                            <select id="edit-payment-status">
                                <option value="미입금">미입금</option>
                                <option value="입금완료">입금완료</option>
                                <option value="부분입금">부분입금</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-payment-amount">입금액</label>
                            <input type="number" id="edit-payment-amount" value="0">
                        </div>
                    </div>
                    <h3 style="margin-top:16px;">품목 내역</h3>
                    <div id="edit-items-container"></div>
                    <button type="button" class="btn btn-secondary" onclick="addEditItemRow()" style="margin-top:8px;">+ 품목 추가</button>
                </div>
                <div class="edit-modal-footer">
                    <button class="btn btn-primary" onclick="saveEditModal()">💾 저장</button>
                    <button class="btn btn-secondary" onclick="saveAndReissue()">💾 저장 후 명세표 재발행</button>
                    <button class="btn btn-danger" onclick="deleteEditSales()">🗑 전체 삭제</button>
                    <button class="btn btn-secondary" onclick="closeEditModal()">취소</button>
                </div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        let itemCounter = 0;
        let customPriceCache = {};
        let allItems = [];

        // ==========================================
        // 품목 행 HTML 생성 함수
        // ==========================================
        function createItemRowHTML(index) {
            return `
            <div class="item-row" data-item-index="${index}" style="background:#f9f9f9; border:1px solid #e0e0e0; border-radius:8px; padding:12px; margin-bottom:12px;">
                <div class="form-row">
                    <div class="form-group">
                        <label>품목 *</label>
                        <select class="item-name" required onchange="onItemSelect(this)">
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>수량 *</label>
                        <input type="number" class="item-quantity" value="1" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>단가 * <small class="price-source-badge" style="font-weight:normal; font-size:11px; margin-left:4px;"></small></label>
                        <input type="number" class="item-price" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>부가세 방식 *</label>
                        <div style="display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;">
                            <label style="display:flex; align-items:center; cursor:pointer; font-size:13px;">
                                <input type="radio" name="tax-type-${index}" value="included" checked style="margin-right:5px;"> 부가세포함
                            </label>
                            <label style="display:flex; align-items:center; cursor:pointer; font-size:13px;">
                                <input type="radio" name="tax-type-${index}" value="excluded" style="margin-right:5px;"> 부가세별도
                            </label>
                            <label style="display:flex; align-items:center; cursor:pointer; font-size:13px; color:#2e7d32; font-weight:bold;">
                                <input type="radio" name="tax-type-${index}" value="exempt" style="margin-right:5px;"> 🟢 면세
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>이력번호</label>
                        <input type="text" class="item-trace-number" placeholder="12자리 이력번호" maxlength="12">
                    </div>
                    <div class="form-group" style="display:flex; align-items:flex-end;">
                        <button type="button" class="btn btn-danger btn-sm" onclick="removeItem(${index})" style="margin-bottom:2px;">삭제</button>
                    </div>
                </div>
            </div>`;
        }

        // ==========================================
        // 초기화
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                document.getElementById('sale-date').value = new Date().toISOString().split('T')[0];
                await loadCustomers();
                await loadAllItems();
                addItemRow(); // 첫 행 추가
                await loadSales();
            } catch (error) {
                console.error('초기화 에러:', error);
            }
        });

        // ==========================================
        // 품목 목록 로드 (한 번만)
        // ==========================================
        async function loadAllItems() {
            try {
                const result = await getItems();
                if (result.success && result.data.length > 0) {
                    allItems = result.data;
                }
            } catch (e) { console.error('품목 로드 에러:', e); }
        }

        // 특정 select에 품목 옵션 채우기
        function fillItemSelect(sel) {
            while (sel.options.length > 1) sel.remove(1);
            allItems.forEach(item => {
                const opt = new Option(item.name, item.name);
                opt.dataset.price = item.price;
                sel.appendChild(opt);
            });
        }

        // ==========================================
        // 거래처별 단가
        // ==========================================
        async function onCustomerChange(company) {
            const statusEl = document.getElementById('custom-price-status');
            customPriceCache = {};
            if (!company) { statusEl.textContent = ''; return; }

            statusEl.textContent = '⏳ 단가 불러오는 중...';
            try {
                const result = await getCustomPrices(company);
                if (result.success && result.data.length > 0) {
                    result.data.forEach(item => {
                        customPriceCache[item.name] = { price: item.price, source: item.source };
                    });
                    const customCount = result.data.filter(i => i.source === 'custom').length;
                    statusEl.textContent = customCount > 0 ? `✅ 전용단가 ${customCount}개 적용됨` : '기본 단가 사용 중';
                    statusEl.style.color = customCount > 0 ? '#1976d2' : '#888';
                    updateAllItemPrices();
                } else {
                    statusEl.textContent = '';
                }
            } catch (e) { statusEl.textContent = ''; }
        }

        function updateAllItemPrices() {
            document.querySelectorAll('.item-row').forEach(row => {
                const sel = row.querySelector('.item-name');
                if (sel && sel.value) applyPriceToRow(row, sel.value);
            });
        }

        function applyPriceToRow(row, itemName) {
            const priceInput = row.querySelector('.item-price');
            const badge = row.querySelector('.price-source-badge');
            if (!itemName) return;
            const cached = customPriceCache[itemName];
            if (cached) {
                priceInput.value = cached.price;
                if (badge) {
                    badge.textContent = cached.source === 'custom' ? '🔵 전용단가' : '기본단가';
                    badge.style.color = cached.source === 'custom' ? '#1976d2' : '#888';
                }
            } else {
                const sel = row.querySelector('.item-name');
                const opt = sel ? sel.options[sel.selectedIndex] : null;
                if (opt && opt.dataset.price) {
                    priceInput.value = opt.dataset.price;
                    if (badge) { badge.textContent = '기본단가'; badge.style.color = '#888'; }
                }
            }
        }

        function onItemSelect(selectEl) {
            const row = selectEl.closest('.item-row');
            applyPriceToRow(row, selectEl.value);
        }

        // ==========================================
        // 거래처 로드
        // ==========================================
        let allCustomers = [];

        async function loadCustomers() {
            try {
                const result = await getCompanies();
                if (result.success && result.data.length > 0) {
                    allCustomers = result.data.filter(c => c.type === '거래처').map(c => c.name);
                    renderDropdown('customer-dropdown', allCustomers, selectCustomer);
                    renderDropdown('customer-dropdown2', ['전체', ...allCustomers], selectCustomer2);
                }
            } catch (e) { console.error('거래처 로드 에러:', e); }
        }

        function renderDropdown(id, list, fn) {
            const dd = document.getElementById(id);
            dd.innerHTML = list.map(n =>
                `<div class="search-item" onmousedown="event.preventDefault()" onclick="${fn.name}('${n}')">${n}</div>`
            ).join('');
        }

        function filterCustomerList(val) {
            const filtered = allCustomers.filter(n => n.includes(val));
            const dd = document.getElementById('customer-dropdown');
            dd.innerHTML = filtered.map(n =>
                `<div class="search-item" onmousedown="event.preventDefault()" onclick="selectCustomer('${n}')">${n}</div>`
            ).join('');
            dd.style.display = filtered.length ? 'block' : 'none';
        }

        function filterCustomerList2(val) {
            const list = val ? allCustomers.filter(n => n.includes(val)) : ['전체', ...allCustomers];
            const dd = document.getElementById('customer-dropdown2');
            dd.innerHTML = list.map(n =>
                `<div class="search-item" onmousedown="event.preventDefault()" onclick="selectCustomer2('${n}')">${n}</div>`
            ).join('');
            dd.style.display = list.length ? 'block' : 'none';
        }

        function showCustomerList() { document.getElementById('customer-dropdown').style.display = 'block'; }
        function hideCustomerList() { document.getElementById('customer-dropdown').style.display = 'none'; }
        function showCustomerList2() { document.getElementById('customer-dropdown2').style.display = 'block'; }
        function hideCustomerList2() { document.getElementById('customer-dropdown2').style.display = 'none'; }

        function selectCustomer(name) {
            document.getElementById('customer-search').value = name;
            document.getElementById('sale-customer').value = name;
            document.getElementById('customer-dropdown').style.display = 'none';
            onCustomerChange(name);
        }

        function selectCustomer2(name) {
            document.getElementById('filter-customer-search').value = name === '전체' ? '' : name;
            document.getElementById('filter-customer').value = name === '전체' ? '' : name;
            document.getElementById('customer-dropdown2').style.display = 'none';
        }

        // ==========================================
        // 품목 행 추가 / 삭제
        // ==========================================
        function addItemRow() {
            const container = document.getElementById('items-container');
            const idx = itemCounter++;
            const div = document.createElement('div');
            div.innerHTML = createItemRowHTML(idx);
            const row = div.firstElementChild;
            container.appendChild(row);

            // 새 행의 select에만 품목 채우기 (기존 행 유지)
            const sel = row.querySelector('.item-name');
            fillItemSelect(sel);
        }

        function removeItem(index) {
            const row = document.querySelector(`[data-item-index="${index}"]`);
            if (row) {
                const container = document.getElementById('items-container');
                if (container.children.length > 1) {
                    row.remove();
                } else {
                    alert('최소 1개의 품목은 있어야 합니다.');
                }
            }
        }

        // ==========================================
        // 폼 제출
        // ==========================================
        document.getElementById('sale-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            await handleMultiItemSubmit();
        });

        async function handleMultiItemSubmit() {
            try {
                const date = document.getElementById('sale-date').value;
                const customer = document.getElementById('sale-customer').value;
                const delivery = document.getElementById('sale-delivery').value;
                const boxReturn = document.getElementById('sale-box-return').value;
                const paymentStatus = document.getElementById('sale-payment-status').value;
                const paymentAmount = Number(document.getElementById('sale-payment-amount').value);

                if (!customer) { alert('거래처를 선택해주세요.'); return; }

                const sales = [];
                document.querySelectorAll('.item-row').forEach(row => {
                    const idx = row.dataset.itemIndex;
                    const itemName = row.querySelector('.item-name').value;
                    const quantity = Number(row.querySelector('.item-quantity').value);
                    const price = Number(row.querySelector('.item-price').value);
                    const traceNumber = row.querySelector('.item-trace-number').value || '';

                    // ✅ 각 행의 부가세 방식 읽기
                    const taxRadio = row.querySelector(`input[name="tax-type-${idx}"]:checked`);
                    const taxMode = taxRadio ? taxRadio.value : 'included';

                    if (!itemName || quantity <= 0 || price <= 0) return;

                    let supplyPrice, vat, total;
                    if (taxMode === 'exempt') {
                        total = price; supplyPrice = price; vat = 0;
                    } else if (taxMode === 'included') {
                        total = price;
                        supplyPrice = Math.round(price / 1.1);
                        vat = price - supplyPrice;
                    } else {
                        supplyPrice = price;
                        vat = Math.round(price * 0.1);
                        total = price + vat;
                    }

                    const totalSupply = supplyPrice * quantity;
                    const totalVat = vat * quantity;
                    const totalAmount = total * quantity;

                    sales.push({
                        date, customer, item: itemName, quantity,
                        price: total,
                        supplyPrice: totalSupply,
                        vat: totalVat,
                        total: totalAmount,
                        delivery, traceNumber, boxReturn,
                        taxType: taxMode === 'exempt' ? '면세' : '과세'
                    });
                });

                if (sales.length === 0) { alert('최소 1개 이상의 품목을 입력해주세요.'); return; }

                const grandTotal = sales.reduce((sum, s) => sum + s.total, 0);
                let remainingPayment = paymentAmount;

                sales.forEach((s, idx) => {
                    let itemPayment;
                    if (idx === sales.length - 1) {
                        itemPayment = remainingPayment;
                    } else {
                        itemPayment = grandTotal > 0 ? Math.round(paymentAmount * (s.total / grandTotal)) : 0;
                    }
                    remainingPayment -= itemPayment;
                    s.paymentStatus = paymentStatus;
                    s.paymentAmount = itemPayment;
                    s.unpaid = s.total - itemPayment;
                });

                let successCount = 0;
                for (const sale of sales) {
                    const result = await addSale(sale);
                    if (result.success) successCount++;
                }

                if (successCount > 0) {
                    alert(`${successCount}개 품목이 등록되었습니다.`);
                    resetSaleForm();
                    await loadSales();
                } else {
                    alert('등록에 실패했습니다.');
                }
            } catch (error) {
                alert('판매 등록 중 오류: ' + error.message);
            }
        }

        // ==========================================
        // 폼 초기화
        // ==========================================
        function resetSaleForm() {
            document.getElementById('sale-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('customer-search').value = '';
            document.getElementById('sale-customer').value = '';
            document.getElementById('sale-delivery').value = '오프라인';
            document.getElementById('sale-box-return').value = '미회수';
            document.getElementById('sale-payment-status').value = '미입금';
            document.getElementById('sale-payment-amount').value = '0';

            // 기존 행 모두 삭제 후 새 행 1개 추가
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            customPriceCache = {};
            document.getElementById('custom-price-status').textContent = '';
            addItemRow();
        }

        // ==========================================
        // 판매 내역 로드
        // ==========================================
        async function loadSales() {
            const tbody = document.getElementById('sales-tbody');
            tbody.innerHTML = '<tr><td colspan="14" class="text-center">로딩 중...</td></tr>';

            try {
                const result = await getSales();
                if (!result.success) {
                    tbody.innerHTML = `<tr><td colspan="14" class="text-center text-danger">로드 실패</td></tr>`;
                    return;
                }
                if (!result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="14" class="text-center text-muted">판매 내역이 없습니다</td></tr>';
                    return;
                }

                const filterDate = document.getElementById('filter-date').value;
                const filterCustomer = document.getElementById('filter-customer').value;

                let filtered = result.data;
                if (filterDate) filtered = filtered.filter(s => formatDate(s.date) === filterDate);
                if (filterCustomer) filtered = filtered.filter(s => s.customer === filterCustomer);

                filtered.sort((a, b) => {
                    const diff = new Date(a.date) - new Date(b.date);
                    return diff !== 0 ? diff : (a.customer || '').localeCompare(b.customer || '', 'ko-KR');
                });

                const grouped = {};
                filtered.forEach(sale => {
                    const key = `${formatDate(sale.date)}_${sale.customer}`;
                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(sale);
                });

                const groupUnpaid = {};
                Object.keys(grouped).forEach(key => {
                    groupUnpaid[key] = grouped[key].reduce((sum, s) => sum + (s.unpaid || 0), 0);
                });

                let html = '';
                filtered.forEach(sale => {
                    const key = `${formatDate(sale.date)}_${sale.customer}`;
                    const isFirst = grouped[key][0] === sale;
                    const rowSpan = grouped[key].length;
                    const isExempt = sale.taxType === '면세';

                    html += `<tr>`;
                    if (isFirst) {
                        html += `<td rowspan="${rowSpan}">${formatDate(sale.date)}</td>
                                 <td rowspan="${rowSpan}">${sale.customer}</td>`;
                    }

                    const vatDisplay = isExempt
                        ? `<span style="color:#2e7d32; font-weight:bold;">면세</span>`
                        : formatCurrency(sale.vat);

                    html += `
                        <td>${sale.item}</td>
                        <td class="text-center">${sale.quantity}</td>
                        <td class="text-right">${formatCurrency(sale.price)}</td>
                        <td class="text-right">${formatCurrency(sale.supplyPrice)}</td>
                        <td class="text-right">${vatDisplay}</td>
                        <td class="text-right">${formatCurrency(sale.total)}</td>
                    `;

                    if (isFirst) {
                        const badge = sale.paymentStatus === '입금완료' ? 'badge-success'
                            : sale.paymentStatus === '부분입금' ? 'badge-warning' : 'badge-danger';
                        html += `
                            <td rowspan="${rowSpan}"><span class="badge ${badge}">${sale.paymentStatus}</span></td>
                            <td rowspan="${rowSpan}" class="text-right">${formatCurrency(groupUnpaid[key])}</td>
                            <td rowspan="${rowSpan}" class="text-center">${sale.delivery}</td>
                        `;
                    }

                    html += `
                        <td class="text-center">${sale.traceNumber || '-'}</td>
                        <td class="text-center"><span class="badge ${sale.boxReturn === '회수' ? 'badge-success' : 'badge-warning'}">${sale.boxReturn}</span></td>
                    `;

                    if (isFirst) {
                        html += `<td rowspan="${rowSpan}" class="text-center" style="white-space:nowrap;">
                            <button class="btn btn-sm btn-primary" onclick="generateStatement('${sale.date}', '${sale.customer}')" style="margin-bottom:4px;">📄 명세표</button>
                            <button class="btn btn-sm btn-secondary" onclick="openEditModal('${formatDate(sale.date)}', '${sale.customer}')" style="margin-bottom:4px;">✏️ 수정</button>
                        </td>`;
                    }

                    html += `</tr>`;
                });

                tbody.innerHTML = html || '<tr><td colspan="14" class="text-center text-muted">표시할 데이터가 없습니다</td></tr>';

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="14" class="text-center text-danger">오류: ${error.message}</td></tr>`;
            }
        }

        async function generateStatement(date, customer) {
            try {
                const result = await createStatement(formatDate(date), customer);
                if (result.success) {
                    alert('거래명세표가 생성되었습니다.');
                    window.open(result.url, '_blank');
                } else {
                    alert('명세표 생성 실패: ' + result.message);
                }
            } catch (error) {
                alert('명세표 생성 중 오류: ' + error.message);
            }
        }

        function formatDate(dateString) {
            try {
                if (!dateString) return '-';
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return '-';
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            } catch(e) { return '-'; }
        }

        function formatCurrency(amount) {
            try {
                if (typeof amount !== 'number') return '0';
                return amount.toLocaleString('ko-KR');
            } catch(e) { return '0'; }
        }

        // ==========================================
        // 수정 모달 기능
        // ==========================================
        let editSalesData = [];     // 현재 편집 중인 판매 데이터
        let editItemCounter = 0;    // 편집 모달 품목 카운터
        let editOriginalDate = '';
        let editOriginalCustomer = '';

        function createEditItemRowHTML(index, data = {}) {
            const taxIncluded = (!data.taxType || data.taxType === '과세') ? 'checked' : '';
            const taxExempt = data.taxType === '면세' ? 'checked' : '';
            return `
            <div class="edit-item-row" data-edit-index="${index}" style="background:#f9f9f9; border:1px solid #e0e0e0; border-radius:8px; padding:12px; margin-bottom:10px;">
                <div class="form-row">
                    <div class="form-group">
                        <label>품목 *</label>
                        <select class="edit-item-name" required>
                            <option value="">선택하세요</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>수량 *</label>
                        <input type="number" class="edit-item-quantity" value="${data.quantity || 1}" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>단가 *</label>
                        <input type="number" class="edit-item-price" value="${data.price || ''}" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>부가세 방식</label>
                        <div style="display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;">
                            <label style="display:flex; align-items:center; cursor:pointer; font-size:13px;">
                                <input type="radio" name="edit-tax-type-${index}" value="included" ${taxIncluded} style="margin-right:5px;"> 부가세포함
                            </label>
                            <label style="display:flex; align-items:center; cursor:pointer; font-size:13px;">
                                <input type="radio" name="edit-tax-type-${index}" value="excluded" style="margin-right:5px;"> 부가세별도
                            </label>
                            <label style="display:flex; align-items:center; cursor:pointer; font-size:13px; color:#2e7d32; font-weight:bold;">
                                <input type="radio" name="edit-tax-type-${index}" value="exempt" ${taxExempt} style="margin-right:5px;"> 면세
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>이력번호</label>
                        <input type="text" class="edit-item-trace" value="${data.traceNumber || ''}" placeholder="12자리" maxlength="12">
                    </div>
                    <div class="form-group" style="display:flex; align-items:flex-end;">
                        <button type="button" class="btn btn-danger btn-sm" onclick="removeEditItem(${index})" style="margin-bottom:2px;">삭제</button>
                    </div>
                </div>
            </div>`;
        }

        async function openEditModal(date, customer) {
            editOriginalDate = date;
            editOriginalCustomer = customer;
            editItemCounter = 0;

            const modal = document.getElementById('edit-modal');
            const infoEl = document.getElementById('edit-modal-info');
            infoEl.innerHTML = `<strong>${customer}</strong> - ${date} 판매 내역을 수정합니다.`;

            // 판매 데이터 로드
            try {
                const result = await getSales();
                if (!result.success || !result.data) {
                    alert('판매 데이터를 불러올 수 없습니다.');
                    return;
                }

                editSalesData = result.data.filter(s =>
                    formatDate(s.date) === date && s.customer === customer
                );

                if (editSalesData.length === 0) {
                    alert('해당 날짜/거래처의 판매 데이터가 없습니다.');
                    return;
                }

                // 공통 필드 채우기 (첫 번째 행 기준)
                const first = editSalesData[0];
                document.getElementById('edit-date').value = date;
                document.getElementById('edit-delivery').value = first.delivery || '오프라인';
                document.getElementById('edit-box-return').value = first.boxReturn || '미회수';
                document.getElementById('edit-payment-status').value = first.paymentStatus || '미입금';

                // 입금액 합산
                const totalPayment = editSalesData.reduce((sum, s) => sum + (s.paymentAmount || 0), 0);
                document.getElementById('edit-payment-amount').value = totalPayment;

                // 품목 행 렌더링
                const container = document.getElementById('edit-items-container');
                container.innerHTML = '';

                editSalesData.forEach(sale => {
                    const idx = editItemCounter++;
                    const div = document.createElement('div');
                    div.innerHTML = createEditItemRowHTML(idx, {
                        quantity: sale.quantity,
                        price: sale.price,
                        taxType: sale.taxType,
                        traceNumber: sale.traceNumber
                    });
                    const row = div.firstElementChild;
                    container.appendChild(row);

                    // 품목 select 채우기 + 선택
                    const sel = row.querySelector('.edit-item-name');
                    allItems.forEach(item => {
                        const opt = new Option(item.name, item.name);
                        opt.dataset.price = item.price;
                        sel.appendChild(opt);
                    });
                    sel.value = sale.item;

                    // rowIndex 저장 (수정 시 사용)
                    row.dataset.rowIndex = sale.rowIndex || '';
                });

                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';

            } catch (error) {
                alert('판매 데이터 로드 중 오류: ' + error.message);
            }
        }

        function addEditItemRow() {
            const container = document.getElementById('edit-items-container');
            const idx = editItemCounter++;
            const div = document.createElement('div');
            div.innerHTML = createEditItemRowHTML(idx, {});
            const row = div.firstElementChild;
            container.appendChild(row);

            const sel = row.querySelector('.edit-item-name');
            allItems.forEach(item => {
                const opt = new Option(item.name, item.name);
                opt.dataset.price = item.price;
                sel.appendChild(opt);
            });
            row.dataset.rowIndex = ''; // 새 항목
        }

        function removeEditItem(index) {
            const row = document.querySelector(`[data-edit-index="${index}"]`);
            if (row) {
                const container = document.getElementById('edit-items-container');
                if (container.children.length > 1) {
                    row.remove();
                } else {
                    alert('최소 1개의 품목은 있어야 합니다.');
                }
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            document.body.style.overflow = '';
            editSalesData = [];
        }

        function collectEditData() {
            const date = document.getElementById('edit-date').value;
            const delivery = document.getElementById('edit-delivery').value;
            const boxReturn = document.getElementById('edit-box-return').value;
            const paymentStatus = document.getElementById('edit-payment-status').value;
            const paymentAmount = Number(document.getElementById('edit-payment-amount').value);

            if (!date) { alert('판매일을 입력하세요.'); return null; }

            const items = [];
            document.querySelectorAll('.edit-item-row').forEach(row => {
                const idx = row.dataset.editIndex;
                const itemName = row.querySelector('.edit-item-name').value;
                const quantity = Number(row.querySelector('.edit-item-quantity').value);
                const price = Number(row.querySelector('.edit-item-price').value);
                const traceNumber = row.querySelector('.edit-item-trace').value || '';
                const taxRadio = row.querySelector(`input[name="edit-tax-type-${idx}"]:checked`);
                const taxMode = taxRadio ? taxRadio.value : 'included';
                const rowIndex = row.dataset.rowIndex || '';

                if (!itemName || quantity <= 0 || price <= 0) return;

                let supplyPrice, vat, total;
                if (taxMode === 'exempt') {
                    total = price; supplyPrice = price; vat = 0;
                } else if (taxMode === 'included') {
                    total = price;
                    supplyPrice = Math.round(price / 1.1);
                    vat = price - supplyPrice;
                } else {
                    supplyPrice = price;
                    vat = Math.round(price * 0.1);
                    total = price + vat;
                }

                const totalSupply = supplyPrice * quantity;
                const totalVat = vat * quantity;
                const totalAmount = total * quantity;

                items.push({
                    rowIndex,
                    date, customer: editOriginalCustomer,
                    item: itemName, quantity,
                    price: total,
                    supplyPrice: totalSupply,
                    vat: totalVat,
                    total: totalAmount,
                    delivery, traceNumber, boxReturn,
                    taxType: taxMode === 'exempt' ? '면세' : '과세'
                });
            });

            if (items.length === 0) { alert('최소 1개 이상의 품목을 입력해주세요.'); return null; }

            // 입금액 비례 배분
            const grandTotal = items.reduce((sum, s) => sum + s.total, 0);
            let remaining = paymentAmount;
            items.forEach((s, i) => {
                let itemPayment;
                if (i === items.length - 1) {
                    itemPayment = remaining;
                } else {
                    itemPayment = grandTotal > 0 ? Math.round(paymentAmount * (s.total / grandTotal)) : 0;
                }
                remaining -= itemPayment;
                s.paymentStatus = paymentStatus;
                s.paymentAmount = itemPayment;
                s.unpaid = s.total - itemPayment;
            });

            return items;
        }

        async function saveEditModal() {
            const items = collectEditData();
            if (!items) return;

            if (!confirm('판매 내역을 수정하시겠습니까?')) return;

            try {
                // 1단계: 기존 행 삭제 (rowIndex가 있는 원본 데이터)
                const deleteIndices = editSalesData
                    .filter(s => s.rowIndex)
                    .map(s => s.rowIndex);

                // 역순으로 삭제 (행번호 밀림 방지)
                const sortedIndices = deleteIndices.sort((a, b) => Number(b) - Number(a));
                for (const idx of sortedIndices) {
                    await deleteSale(idx);
                }

                // 2단계: 새 데이터 등록
                let successCount = 0;
                for (const item of items) {
                    delete item.rowIndex;
                    const result = await addSale(item);
                    if (result.success) successCount++;
                }

                if (successCount > 0) {
                    alert(`${successCount}개 품목이 수정되었습니다.`);
                    closeEditModal();
                    await loadSales();
                } else {
                    alert('수정에 실패했습니다.');
                }
            } catch (error) {
                alert('수정 중 오류: ' + error.message);
            }
        }

        async function saveAndReissue() {
            const items = collectEditData();
            if (!items) return;

            if (!confirm('판매 내역을 수정하고 거래명세표를 재발행하시겠습니까?')) return;

            try {
                const deleteIndices = editSalesData
                    .filter(s => s.rowIndex)
                    .map(s => s.rowIndex);

                const sortedIndices = deleteIndices.sort((a, b) => Number(b) - Number(a));
                for (const idx of sortedIndices) {
                    await deleteSale(idx);
                }

                let successCount = 0;
                const newDate = items[0].date;
                const newCustomer = items[0].customer;

                for (const item of items) {
                    delete item.rowIndex;
                    const result = await addSale(item);
                    if (result.success) successCount++;
                }

                if (successCount > 0) {
                    alert(`${successCount}개 품목이 수정되었습니다. 명세표를 재발행합니다.`);
                    closeEditModal();
                    await loadSales();
                    await generateStatement(newDate, newCustomer);
                } else {
                    alert('수정에 실패했습니다.');
                }
            } catch (error) {
                alert('수정/재발행 중 오류: ' + error.message);
            }
        }

        async function deleteEditSales() {
            if (!confirm(`⚠️ ${editOriginalCustomer}의 ${editOriginalDate} 판매 내역을 전부 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;

            try {
                const deleteIndices = editSalesData
                    .filter(s => s.rowIndex)
                    .map(s => s.rowIndex);

                const sortedIndices = deleteIndices.sort((a, b) => Number(b) - Number(a));
                let delCount = 0;
                for (const idx of sortedIndices) {
                    const result = await deleteSale(idx);
                    if (result.success) delCount++;
                }

                alert(`${delCount}개 항목이 삭제되었습니다.`);
                closeEditModal();
                await loadSales();
            } catch (error) {
                alert('삭제 중 오류: ' + error.message);
            }
        }
    </script>
</body>
</html>

}

}

    display: flex; justify-content: space-between; align-items: center;

}
